<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Toggle Switch</title>
<style>
  @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@400;700&display=swap");
  
  body {
    margin: 0;
    background: #0a0a0a;
    color: white;
    font-family: "Manrope", sans-serif;
    display: grid;
    place-items: center;
    min-height: 100vh;
    padding: 40px 20px;
  }

  .container {
    max-width: 900px;
    width: 100%;
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 24px;
    padding: 40px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
  }

  h1 {
    font-size: 2.5rem;
    margin-bottom: 20px;
    text-align: center;
  }

  p {
    text-align: center;
    color: #aaa;
    margin-bottom: 30px;
  }

  /* Der Gist wird hier eingefügt */
  .gist-container {
    border-radius: 16px;
    overflow: hidden;
  }
</style>
</head>
<body>

  
  <div class="gist-container">
    <script src="https://gist.github.com/hpmine42/612e6a5abf24465450f4d8f8a50da6aa.js"></script>
  </div>
</div>

</body>
</html>
